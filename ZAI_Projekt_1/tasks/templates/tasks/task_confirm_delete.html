{% extends "base.html" %}

{% block title %}Usuń zadanie{% endblock %}

{% block content %}

<h1>Usuń zadanie</h1>

<div class="card">
    <div class="card-body">

        <p>
            Czy na pewno chcesz usunąć:
            <strong>{{ object.title }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Usuń
            </button>

            <a href="{% url 'task_list' %}" class="btn btn-secondary">
                Anuluj
            </a>
        </form>

    </div>
</div>

{% endblock %}
