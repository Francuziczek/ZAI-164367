<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4 text-center">🛒 Products</h1>

    <div class="row" id="products-container">

    </div>
</div>

<script>
    const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzc2MzQyMjczLCJpYXQiOjE3NzYzMzg2NzMsImp0aSI6IjhkNmExZTY4OGQwMDRkNjI5NmJlOTc2YTdmYjBhZGViIiwidXNlcl9pZCI6IjEifQ.9ZoiMsQ98TDe6FEcvV3EVwrDyv65AZnQKQc_Gx6HBP8";

    fetch("/api/products/", {
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById("products-container");

        data.forEach(product => {
            container.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow">
                        <img src="${product.image}" class="card-img-top" style="height:200px; object-fit:contain;">
                        <div class="card-body">
                            <h5 class="card-title">${product.title}</h5>
                            <p class="card-text">${product.description.substring(0, 80)}...</p>
                            <p class="fw-bold">$${product.price}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    });
</script>

</body>
</html>
